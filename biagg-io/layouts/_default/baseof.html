<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}Biagg.io{{ else }}{{ .Title }} · Biagg.io{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ $.Site.Params.description }}{{ end }}">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  {{ range .AlternativeOutputFormats -}}
  <link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink | safeURL }}">
  {{ end -}}
</head>
<body>

  <header>
    <a href="/" class="site-title">Biagg.io</a>
  </header>

  {{ partial "nav.html" . }}

  <main class="page">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="page">
      <span>&copy; {{ now.Year }} {{ $.Site.Params.author }}</span>
    </div>
  </footer>

</body>
</html>
